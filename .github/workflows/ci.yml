name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  demo-app-tests:
    name: demo-app Playwright tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: demo-app
    env:
      AUTH_SECRET: ${{ secrets.AUTH_SECRET || 'ci-dummy-secret-at-least-32-bytes-long-for-authjs' }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: demo-app/package-lock.json

      - name: Confirm Chrome is available
        run: google-chrome --version

      - run: npm ci

      - run: npm run build

      - run: npx playwright test

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            demo-app/playwright-report/
            demo-app/test-results/
          retention-days: 7
